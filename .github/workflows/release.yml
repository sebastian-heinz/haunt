name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish with --dry-run"
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu, i686-pc-windows-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Install MinGW-w64 (x64 + x86)
        # Required for cross-compiling the Windows targets in the sanity
        # build step below. `cargo publish --no-verify` would otherwise
        # ship a commit that doesn't actually build for the workspace's
        # default target.
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 gcc-mingw-w64-i686

      - name: Sanity build (cross-compile guard for crates.io)
        # The publish steps below pass `--no-verify` because crates.io's
        # build environment can't compile to x86_64-pc-windows-gnu. Build
        # both bitnesses ourselves first so a publishable-but-broken
        # commit fails CI rather than failing for users on `cargo install`.
        run: |
          cargo build --release --target x86_64-pc-windows-gnu
          cargo build --release --target i686-pc-windows-gnu -p haunt-windows -p haunt-inject

      - name: Verify tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ws=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$tag" != "$ws" ]; then
            echo "tag $tag does not match workspace version $ws" >&2
            exit 1
          fi

      - name: Set publish flags
        id: flags
        run: |
          # --no-verify: the workspace default target is x86_64-pc-windows-gnu
          # (for cross-compiling the agent DLL), which isn't installed on the
          # Linux runner. Local dry-runs cover verification.
          base="--no-verify"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "flags=$base --dry-run --allow-dirty" >> "$GITHUB_OUTPUT"
          else
            echo "flags=$base" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish haunt-core
        run: cargo publish -p haunt-core ${{ steps.flags.outputs.flags }}

      - name: Publish haunt-inject
        run: cargo publish -p haunt-inject ${{ steps.flags.outputs.flags }}

      - name: Publish haunt
        run: cargo publish -p haunt ${{ steps.flags.outputs.flags }}
