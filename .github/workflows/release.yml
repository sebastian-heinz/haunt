name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish with --dry-run"
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ws=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$tag" != "$ws" ]; then
            echo "tag $tag does not match workspace version $ws" >&2
            exit 1
          fi

      - name: Set publish flags
        id: flags
        run: |
          # --no-verify: the workspace default target is x86_64-pc-windows-gnu
          # (for cross-compiling the agent DLL), which isn't installed on the
          # Linux runner. Local dry-runs cover verification.
          base="--no-verify"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "flags=$base --dry-run --allow-dirty" >> "$GITHUB_OUTPUT"
          else
            echo "flags=$base" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish haunt-core
        run: cargo publish -p haunt-core ${{ steps.flags.outputs.flags }}

      - name: Publish haunt-inject
        run: cargo publish -p haunt-inject ${{ steps.flags.outputs.flags }}

      - name: Publish haunt
        run: cargo publish -p haunt ${{ steps.flags.outputs.flags }}
