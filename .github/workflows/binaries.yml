name: binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  windows:
    name: windows (DLL + injector + CLI, x64 + x86)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW-w64 (x64 + x86)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 gcc-mingw-w64-i686

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu, i686-pc-windows-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Build x64 artifacts
        run: cargo build --release --target x86_64-pc-windows-gnu -p haunt-windows -p haunt-inject -p haunt

      - name: Build x86 artifacts (DLL + injector only)
        run: cargo build --release --target i686-pc-windows-gnu -p haunt-windows -p haunt-inject

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp target/x86_64-pc-windows-gnu/release/haunt.dll dist/haunt.dll
          cp target/x86_64-pc-windows-gnu/release/haunt-inject.exe dist/haunt-inject.exe
          cp target/x86_64-pc-windows-gnu/release/haunt.exe dist/haunt.exe
          cp target/i686-pc-windows-gnu/release/haunt.dll dist/haunt-x86.dll
          cp target/i686-pc-windows-gnu/release/haunt-inject.exe dist/haunt-inject-x86.exe
          ls -la dist/
          (cd dist && sha256sum haunt.dll haunt-inject.exe haunt.exe haunt-x86.dll haunt-inject-x86.exe > SHA256SUMS)

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/haunt.dll
            dist/haunt-inject.exe
            dist/haunt.exe
            dist/haunt-x86.dll
            dist/haunt-inject-x86.exe
            dist/SHA256SUMS
          fail_on_unmatched_files: true

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ github.sha }}
          path: dist/

  cli-linux:
    # musl static linking: a single binary runs on any Linux distro
    # from kernel 2.6+ — no glibc version dance, no shared-lib
    # surprises on minimal containers, no if/else for old vs new
    # systems. The CLI talks loopback HTTP and uses only `std`, so
    # there's no OpenSSL / native-tls dep to drag in.
    name: cli-${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            asset: haunt-linux-x86_64
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-22.04-arm
            asset: haunt-linux-arm64
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p haunt

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/haunt dist/${{ matrix.asset }}
          ls -la dist/

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
          fail_on_unmatched_files: true

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  cli-macos:
    # Single Apple Silicon runner builds both arches plus a lipo'd
    # universal binary. Apple's clang ships both SDKs, so x86_64
    # cross-compilation from arm64 host is native and reliable —
    # avoids the lengthy macos-13 (Intel) runner queue that left v0.5.1
    # stuck for ~25 min waiting on a runner allocation.
    name: cli-macos
    runs-on: macos-14
    permissions:
      contents: write
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-bundle

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin -p haunt

      - name: Build arm64
        run: cargo build --release --target aarch64-apple-darwin -p haunt

      - name: Stage artifacts (per-arch + universal lipo)
        run: |
          mkdir -p dist
          cp target/x86_64-apple-darwin/release/haunt   dist/haunt-macos-x86_64
          cp target/aarch64-apple-darwin/release/haunt  dist/haunt-macos-arm64
          lipo -create dist/haunt-macos-x86_64 dist/haunt-macos-arm64 \
               -output dist/haunt-macos-universal
          ls -la dist/
          file dist/haunt-macos-*

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/haunt-macos-x86_64
            dist/haunt-macos-arm64
            dist/haunt-macos-universal
          fail_on_unmatched_files: true

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ github.sha }}
          path: dist/haunt-macos-*
