name: binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CARGO_TERM_COLOR: always
      TARGET: x86_64-pc-windows-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Build release artifacts
        run: cargo build --release -p haunt-windows -p haunt-inject -p haunt

      - name: Stage artifacts
        id: stage
        run: |
          out="target/${TARGET}/release"
          mkdir -p dist
          cp "$out/haunt.dll" dist/
          cp "$out/haunt-inject.exe" dist/
          cp "$out/haunt.exe" dist/
          ls -la dist/
          (cd dist && sha256sum haunt.dll haunt-inject.exe haunt.exe > SHA256SUMS)

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/haunt.dll
            dist/haunt-inject.exe
            dist/haunt.exe
            dist/SHA256SUMS
          fail_on_unmatched_files: true

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: haunt-${{ github.sha }}
          path: dist/
