name: binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  windows:
    name: windows (DLL + injector + CLI, x64 + x86)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW-w64 (x64 + x86)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 gcc-mingw-w64-i686

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu, i686-pc-windows-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Build x64 artifacts
        run: cargo build --release --target x86_64-pc-windows-gnu -p haunt-windows -p haunt-inject -p haunt

      - name: Build x86 artifacts (DLL + injector only)
        run: cargo build --release --target i686-pc-windows-gnu -p haunt-windows -p haunt-inject

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp target/x86_64-pc-windows-gnu/release/haunt.dll dist/haunt.dll
          cp target/x86_64-pc-windows-gnu/release/haunt-inject.exe dist/haunt-inject.exe
          cp target/x86_64-pc-windows-gnu/release/haunt.exe dist/haunt.exe
          cp target/i686-pc-windows-gnu/release/haunt.dll dist/haunt-x86.dll
          cp target/i686-pc-windows-gnu/release/haunt-inject.exe dist/haunt-inject-x86.exe
          ls -la dist/
          (cd dist && sha256sum haunt.dll haunt-inject.exe haunt.exe haunt-x86.dll haunt-inject-x86.exe > SHA256SUMS)

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/haunt.dll
            dist/haunt-inject.exe
            dist/haunt.exe
            dist/haunt-x86.dll
            dist/haunt-inject-x86.exe
            dist/SHA256SUMS
          fail_on_unmatched_files: true

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ github.sha }}
          path: dist/

  cli:
    # Builds the haunt CLI for non-Windows hosts. The DLL and injector
    # are Windows-only by definition (live in the target's address
    # space, use Win32 directly), so only the CLI is matrix-built here.
    #
    # Linux uses musl static linking so a single binary runs on any
    # distro from kernel 2.6+ — no glibc version dance, no shared-lib
    # surprises on minimal containers, no if/else for old vs new
    # systems. The CLI talks loopback HTTP and uses only `std`, so
    # there's no OpenSSL / native-tls dep to drag in.
    #
    # macOS uses native runners (one per arch). Cross-compiling
    # x64→arm64 macOS would need the SDK shipped separately;
    # native runners are simpler and the matrix cost is two extra
    # short jobs.
    name: cli-${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            asset: haunt-linux-x64
            install: sudo apt-get update && sudo apt-get install -y musl-tools
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-22.04-arm
            asset: haunt-linux-arm64
            install: sudo apt-get update && sudo apt-get install -y musl-tools
          - target: x86_64-apple-darwin
            runner: macos-13
            asset: haunt-macos-x64
            install: ":"
          - target: aarch64-apple-darwin
            runner: macos-14
            asset: haunt-macos-arm64
            install: ":"
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: ${{ matrix.install }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p haunt

      - name: Stage artifact
        # Use shasum (present on macOS + Linux) rather than sha256sum
        # (Linux-only). Output format matches `sha256sum` so a single
        # `sha256sum -c` from any platform validates either checksum.
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/haunt dist/${{ matrix.asset }}
          (cd dist && shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256)
          ls -la dist/

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256
          fail_on_unmatched_files: true

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}*
