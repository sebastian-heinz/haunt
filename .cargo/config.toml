[build]
target = "x86_64-pc-windows-gnu"

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
ar = "x86_64-w64-mingw32-ar"
rustflags = [
    "-C", "link-arg=-static",
    "-C", "link-arg=-static-libgcc",
    "-C", "link-arg=-static-libstdc++",
]

[target.i686-pc-windows-gnu]
linker = "i686-w64-mingw32-gcc"
ar = "i686-w64-mingw32-ar"
rustflags = [
    "-C", "link-arg=-static",
    "-C", "link-arg=-static-libgcc",
    "-C", "link-arg=-static-libstdc++",
    # Some i686 MinGW builds (notably Debian/Ubuntu's gcc-mingw-w64-i686
    # with the win32 threading model) define `_Unwind_Resume` in
    # libgcc_eh.a; brew's posix-threading build does not. Our manual
    # stub in inject/main.rs and windows/lib.rs collides on the former.
    # `--allow-multiple-definition` lets either side win at link time —
    # both implementations abort the process, so behaviour is identical.
    "-C", "link-arg=-Wl,--allow-multiple-definition",
]
